name = "pb-planner"
main = "worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "PB_KV", id = "bb2c2532f87c4afa93f072aa6d59d6fe" }
]

[durable_objects]
bindings = [
  { name = "PB", class_name = "PB" }
]

# v1 — Cloudflare still remembers PBRoom from your old deployment
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PBRoom"]

# v2 — Register your new PB class as a Durable Object
[[migrations]]
tag = "v2"
new_sqlite_classes = ["PB"]

# v3 — Delete the old PBRoom class
[[migrations]]
tag = "v3"
deleted_classes = ["PBRoom"]
